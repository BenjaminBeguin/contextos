services:
  postgres:
    image: postgres:16-alpine
    container_name: memmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memmo
      POSTGRES_PASSWORD: memmo
      POSTGRES_DB: memmo
    ports:
      - "5455:5432"
    volumes:
      - memmo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memmo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: memmo-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memmo_pg:
